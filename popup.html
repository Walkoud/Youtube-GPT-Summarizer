<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Summarizer</title>
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f9f9f9;
      margin: 0;
    }
    h3 {
      margin-top: 0;
      color: #333;
    }
    button {
      background-color: #ff0000;
      color: white;
      border: none;
      padding: 12px 15px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      width: 100%;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #cc0000;
    }
    #status {
      margin-top: 15px;
      font-size: 13px;
      color: #666;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h3>YouTube Summarizer</h3>
  <button id="summarizeBtn">Summarize with ChatGPT</button>
  
  <div style="margin-top: 15px; text-align: left;">
    <label for="promptInput" style="font-size: 13px; color: #333; font-weight: bold;">ChatGPT Prompt:</label>
    <textarea id="promptInput" rows="4" style="width: 100%; box-sizing: border-box; margin-top: 5px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; resize: vertical;"></textarea>
    <button id="savePromptBtn" style="background-color: #4CAF50; margin-top: 5px; padding: 8px;">Save Prompt</button>
  </div>

  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
